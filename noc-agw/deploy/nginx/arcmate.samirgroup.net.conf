# NOC-AGW public vhost. Name-based, shares the NOC VM's public IP with
# noc.samirgroup.net — nginx routes by server_name, so no second 443 listener.
#
# Install: /etc/nginx/sites-available/arcmate.samirgroup.net.conf
#          ln -s ../sites-available/... /etc/nginx/sites-enabled/
# Cert:    certbot --nginx -d arcmate.samirgroup.net  (or certonly + point below)

server {
    listen 80;
    listen [::]:80;
    server_name arcmate.samirgroup.net;

    # ACME HTTP-01 challenge, then force HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    # `listen ... http2` is accepted by both nginx 1.24 (Ubuntu) and 1.25+.
    # (The standalone `http2 on;` directive only exists on 1.25.1+.)
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arcmate.samirgroup.net;

    ssl_certificate     /etc/letsencrypt/live/arcmate.samirgroup.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcmate.samirgroup.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Legacy app may serve large files/uploads.
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;

        # The gateway derives the real client IP from these. nginx is the only
        # trusted hop (TRUSTED_PROXIES=127.0.0.1), so X-Real-IP/$remote_addr is
        # authoritative and the rightmost X-Forwarded-For entry is the client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket passthrough (harmless if the app doesn't use it).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming-friendly: don't buffer the whole response.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

# Add once to http{} (e.g. /etc/nginx/conf.d/upgrade_map.conf) if not present:
# map $http_upgrade $connection_upgrade { default upgrade; '' close; }
