<!DOCTYPE html>
<!-- TEMPORARY visual harness for the 2FA challenge animation. Safe to delete. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Animation Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .challenge-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.3); width: 420px; overflow: hidden; }
        .challenge-body { padding: 30px; }
        .otp-input {
            font-size: 2rem; text-align: center; letter-spacing: .5em;
            font-family: 'Courier New', monospace; border: 2px solid #e0e0e0;
            border-radius: 10px; padding: 12px 15px; transition: all .3s;
        }
        .otp-input:focus { border-color: #667eea; box-shadow: 0 0 0 .2rem rgba(102,126,234,.25); }

        /* ===== copied verbatim from challenge.blade.php ===== */
        .otp-input.shake { animation: shake .45s cubic-bezier(.36,.07,.19,.97) both; border-color: #ef4444; }
        @keyframes shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }

        .status-overlay { display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:10px 0 6px; animation:fadeIn .25s ease-out; }
        .status-overlay.is-loading, .status-overlay.is-success, .status-overlay.is-error { display:flex; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .status-svg { width:96px; height:96px; }
        .status-overlay.is-success .status-svg { animation:pop .45s ease-out; }
        @keyframes pop { 0%{transform:scale(.85)} 55%{transform:scale(1.06)} 100%{transform:scale(1)} }
        .status-svg circle, .status-svg path, .status-svg line { fill:none; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
        .spinner-ring { stroke:#667eea; stroke-dasharray:175 251; stroke-dashoffset:0; transform-origin:50% 50%; opacity:0; }
        .status-overlay.is-loading .spinner-ring { opacity:1; animation:spin .9s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .success-circle { stroke:#22c55e; stroke-dasharray:251; stroke-dashoffset:251; transform:rotate(-90deg); transform-origin:50% 50%; }
        .success-check { stroke:#22c55e; stroke-width:7; stroke-dasharray:80; stroke-dashoffset:80; }
        .status-overlay.is-success .success-circle { animation:draw .5s ease-out forwards; }
        .status-overlay.is-success .success-check { animation:draw .35s ease-out .42s forwards; }
        .error-circle { stroke:#ef4444; stroke-dasharray:251; stroke-dashoffset:251; transform:rotate(-90deg); transform-origin:50% 50%; }
        .error-x { stroke:#ef4444; stroke-width:7; stroke-dasharray:40; stroke-dashoffset:40; }
        .status-overlay.is-error .error-circle { animation:draw .5s ease-out forwards; }
        .status-overlay.is-error .error-x1 { animation:draw .25s ease-out .4s forwards; }
        .status-overlay.is-error .error-x2 { animation:draw .25s ease-out .6s forwards; }
        @keyframes draw { to{stroke-dashoffset:0} }
        .status-text { margin:14px 0 0; font-weight:600; color:#4b5563; }
        .status-overlay.is-success .status-text { color:#16a34a; }
        .status-overlay.is-error .status-text { color:#dc2626; }
        /* ===== end copied block ===== */
    </style>
</head>
<body>
    <div class="challenge-card">
        <div class="challenge-body">
            <div id="formArea">
                <p class="text-muted text-center mb-4">Type a 6-digit code. <code>123456</code> = success, anything else = error.</p>
                <form id="otpForm" action="#">
                    <div class="mb-4">
                        <input type="text" id="otpInput" class="form-control otp-input" maxlength="6" inputmode="numeric" placeholder="------" autofocus>
                    </div>
                </form>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-sm btn-outline-secondary" onclick="window._show('is-loading','Verifying…')">Loading</button>
                    <button class="btn btn-sm btn-outline-success" onclick="window._show('is-success','Verified')">Success</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="window._fail('Invalid code')">Error</button>
                    <button class="btn btn-sm btn-light" onclick="window._reset()">Reset</button>
                </div>
            </div>

            <div class="status-overlay" id="statusOverlay" aria-live="polite">
                <svg class="status-svg" viewBox="0 0 100 100" aria-hidden="true">
                    <circle class="spinner-ring"   cx="50" cy="50" r="40"></circle>
                    <circle class="success-circle" cx="50" cy="50" r="40"></circle>
                    <path   class="success-check"  d="M30 51 L44 65 L71 35"></path>
                    <circle class="error-circle"   cx="50" cy="50" r="40"></circle>
                    <line   class="error-x error-x1" x1="35" y1="35" x2="65" y2="65"></line>
                    <line   class="error-x error-x2" x1="65" y1="35" x2="35" y2="65"></line>
                </svg>
                <p class="status-text" id="statusText">Verifying…</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('otpInput');
        const formArea = document.getElementById('formArea');
        const overlay = document.getElementById('statusOverlay');
        const status = document.getElementById('statusText');
        let submitting = false;

        window._show = function (state, text) {
            formArea.style.display = 'none';
            overlay.className = 'status-overlay ' + state;
            status.textContent = text;
        };
        window._reset = function () {
            overlay.className = 'status-overlay';
            formArea.style.display = '';
            input.value = '';
            submitting = false;
            input.focus();
        };
        window._fail = function (msg) {
            window._show('is-error', msg);
            setTimeout(function () {
                overlay.className = 'status-overlay';
                formArea.style.display = '';
                input.value = '';
                input.classList.add('shake');
                setTimeout(function () { input.classList.remove('shake'); }, 450);
                input.focus();
                submitting = false;
            }, 1500);
        };

        // Force a state on load for deterministic headless screenshots: ?state=loading|success|error
        (function () {
            const s = new URLSearchParams(location.search).get('state');
            if (s === 'loading') window._show('is-loading', 'Verifying…');
            else if (s === 'success') window._show('is-success', 'Verified');
            else if (s === 'error') window._show('is-error', 'The authentication code is invalid.');
        })();

        // Mirrors challenge.blade.php verify() control flow, network stubbed.
        input.addEventListener('input', function () {
            input.value = input.value.replace(/\D/g, '').slice(0, 6);
            if (input.value.length === 6 && !submitting) {
                submitting = true;
                input.blur();
                window._show('is-loading', 'Verifying…');
                setTimeout(function () {
                    if (input.value === '123456') {
                        window._show('is-success', 'Verified');
                    } else {
                        window._fail('The authentication code is invalid. Please try again.');
                    }
                }, 900);
            }
        });
    </script>
</body>
</html>
