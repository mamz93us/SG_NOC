# в”Ђв”Ђв”Ђ Cisco IOS / IOS-XE switch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Works for Catalyst 2960, 3650/3850, 9200/9300, and most ISR routers.
# Uses three Cisco private MIBs plus standard IF-MIB:
#
#   CISCO-PROCESS-MIB          (.1.3.6.1.4.1.9.9.109)  CPU averages
#   CISCO-MEMORY-POOL-MIB      (.1.3.6.1.4.1.9.9.48)   memory pools
#   CISCO-ENVMON-MIB           (.1.3.6.1.4.1.9.9.13)   temp / fan / PSU
#
# All three are SNMPv2-style tables. The fields below are the
# numeric forms вЂ” Telegraf doesn't load .mib files unless you ship
# them, so OIDs are spelled out.

[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "5s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "cisco_switch"
    host         = "__HOST__"

  # в”Ђ MIB-2 sysDescr / sysName for inventory в”Ђ
  [[inputs.snmp.field]]
    name = "uptime"
    oid  = "1.3.6.1.2.1.1.3.0"
  [[inputs.snmp.field]]
    name   = "sys_name"
    oid    = "1.3.6.1.2.1.1.5.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sys_descr"
    oid  = "1.3.6.1.2.1.1.1.0"

  # в”Ђ CPU usage (CISCO-PROCESS-MIB cpmCPUTotalTable) в”Ђ
  # Modern Cisco gear has multiple CPU rows (one per CPU); we average.
  [[inputs.snmp.table]]
    name         = "snmp_cpu"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "cpu_index"
      oid    = "1.3.6.1.4.1.9.9.109.1.1.1.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "cpu_5sec_pct"
      oid  = "1.3.6.1.4.1.9.9.109.1.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "cpu_1min_pct"
      oid  = "1.3.6.1.4.1.9.9.109.1.1.1.1.7"
    [[inputs.snmp.table.field]]
      name = "cpu_5min_pct"
      oid  = "1.3.6.1.4.1.9.9.109.1.1.1.1.8"

  # в”Ђ Memory pool table (CISCO-MEMORY-POOL-MIB) в”Ђ
  # Pool name (Processor / I/O / Driver text) is a tag; used + free
  # come back in bytes.
  [[inputs.snmp.table]]
    name         = "snmp_memory_pool"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "pool_name"
      oid    = "1.3.6.1.4.1.9.9.48.1.1.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "memory_used_bytes"
      oid  = "1.3.6.1.4.1.9.9.48.1.1.1.5"
    [[inputs.snmp.table.field]]
      name = "memory_free_bytes"
      oid  = "1.3.6.1.4.1.9.9.48.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "memory_largest_free_bytes"
      oid  = "1.3.6.1.4.1.9.9.48.1.1.1.7"

  # в”Ђ Environment вЂ” temperature sensors (CISCO-ENVMON-MIB) в”Ђ
  # State enum: 1=normal 2=warning 3=critical 4=shutdown 5=notPresent 6=notFunctioning
  [[inputs.snmp.table]]
    name         = "snmp_env_temperature"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "sensor_index"
      oid    = "1.3.6.1.4.1.9.9.13.1.3.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "sensor_descr"
      oid    = "1.3.6.1.4.1.9.9.13.1.3.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "temperature_c"
      oid  = "1.3.6.1.4.1.9.9.13.1.3.1.3"
    [[inputs.snmp.table.field]]
      name = "temperature_state"
      oid  = "1.3.6.1.4.1.9.9.13.1.3.1.6"

  # в”Ђ Environment вЂ” fans в”Ђ
  [[inputs.snmp.table]]
    name         = "snmp_env_fan"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "fan_index"
      oid    = "1.3.6.1.4.1.9.9.13.1.4.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "fan_descr"
      oid    = "1.3.6.1.4.1.9.9.13.1.4.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "fan_state"
      oid  = "1.3.6.1.4.1.9.9.13.1.4.1.3"

  # в”Ђ Environment вЂ” power supplies в”Ђ
  [[inputs.snmp.table]]
    name         = "snmp_env_psu"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "psu_index"
      oid    = "1.3.6.1.4.1.9.9.13.1.5.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "psu_descr"
      oid    = "1.3.6.1.4.1.9.9.13.1.5.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "psu_state"
      oid  = "1.3.6.1.4.1.9.9.13.1.5.1.3"

  # в”Ђ Per-interface counters (IF-MIB) в”Ђ
  # Cisco ifDescr is the long name (e.g. GigabitEthernet1/0/1);
  # ifName (1.3.6.1.2.1.31.1.1.1.1) is the short form (Gi1/0/1).
  [[inputs.snmp.table]]
    name         = "snmp_interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_descr"
      oid    = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_name"
      oid    = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_in_errors"
      oid  = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "if_out_errors"
      oid  = "1.3.6.1.2.1.2.2.1.20"
    [[inputs.snmp.table.field]]
      name = "if_in_discards"
      oid  = "1.3.6.1.2.1.2.2.1.13"
    [[inputs.snmp.table.field]]
      name = "if_out_discards"
      oid  = "1.3.6.1.2.1.2.2.1.19"
    [[inputs.snmp.table.field]]
      name = "if_oper_status"
      oid  = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "if_admin_status"
      oid  = "1.3.6.1.2.1.2.2.1.7"
    [[inputs.snmp.table.field]]
      name = "if_speed"
      oid  = "1.3.6.1.2.1.2.2.1.5"

# в”Ђв”Ђв”Ђ ICMP ping for liveness в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[[inputs.ping]]
  urls          = ["__HOST__"]
  count         = 3
  ping_interval = 1.0
  timeout       = 2.0
  interval      = "__POLL_INTERVAL__s"
  [inputs.ping.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "cisco_switch"
    host         = "__HOST__"
