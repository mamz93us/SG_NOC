# ─── Meraki MS / MR with local SNMP enabled ───────────────────
# Newer Meraki firmware exposes basic per-device SNMP on the switch's
# management IP (Dashboard → Switch → Configure → Switch settings →
# SNMP). It returns ONLY standard MIB-2 + IF-MIB — no Meraki-specific
# OIDs, no CPU/memory/temp/PoE. For richer per-device data use the
# meraki_cloud template (org SNMP endpoint) or the Meraki REST API.

[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "5s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "meraki_switch"
    host         = "__HOST__"

  # ─ MIB-2 system info ─
  [[inputs.snmp.field]]
    name = "uptime"
    oid  = "1.3.6.1.2.1.1.3.0"
  [[inputs.snmp.field]]
    name   = "sys_name"
    oid    = "1.3.6.1.2.1.1.5.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sys_descr"
    oid  = "1.3.6.1.2.1.1.1.0"

  # ─ Per-interface counters (IF-MIB) ─
  [[inputs.snmp.table]]
    name         = "snmp_interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_descr"
      oid    = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_name"
      oid    = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_in_errors"
      oid  = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "if_out_errors"
      oid  = "1.3.6.1.2.1.2.2.1.20"
    [[inputs.snmp.table.field]]
      name = "if_in_discards"
      oid  = "1.3.6.1.2.1.2.2.1.13"
    [[inputs.snmp.table.field]]
      name = "if_out_discards"
      oid  = "1.3.6.1.2.1.2.2.1.19"
    [[inputs.snmp.table.field]]
      name = "if_oper_status"
      oid  = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "if_admin_status"
      oid  = "1.3.6.1.2.1.2.2.1.7"
    [[inputs.snmp.table.field]]
      name = "if_speed"
      oid  = "1.3.6.1.2.1.2.2.1.5"

# ─── ICMP ping for liveness ────────────────────────────────────
[[inputs.ping]]
  urls          = ["__HOST__"]
  count         = 3
  ping_interval = 1.0
  timeout       = 2.0
  interval      = "__POLL_INTERVAL__s"
  [inputs.ping.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "meraki_switch"
    host         = "__HOST__"
