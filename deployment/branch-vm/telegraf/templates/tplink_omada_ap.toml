# ─── TP-Link Omada AP (EAP series) ─────────────────────────────
# Standard MIB-2 + per-interface counters. Omada APs expose limited
# private OIDs over SNMP; richer telemetry only via Omada Controller.
[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "5s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "tplink_omada_ap"
    host         = "__HOST__"

  [[inputs.snmp.field]]
    name = "uptime"
    oid  = "1.3.6.1.2.1.1.3.0"
  [[inputs.snmp.field]]
    name   = "sys_name"
    oid    = "1.3.6.1.2.1.1.5.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sys_descr"
    oid  = "1.3.6.1.2.1.1.1.0"

  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]
    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_descr"
      oid    = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_oper_status"
      oid  = "1.3.6.1.2.1.2.2.1.8"

[[inputs.ping]]
  urls       = ["__HOST__"]
  count      = 3
  timeout    = 2.0
  interval   = "__POLL_INTERVAL__s"
  [inputs.ping.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "tplink_omada_ap"
    host         = "__HOST__"
