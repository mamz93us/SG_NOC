# ─── Generic managed switch — works for Cisco / TP-Link / HP / etc. ────
# Pulls only standard MIB-2: system + IF-MIB. For per-vendor extras
# (PoE budget, STP, MAC table) add a vendor-specific template later.
[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "5s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "switch_generic"
    host         = "__HOST__"

  [[inputs.snmp.field]]
    name = "uptime"
    oid  = "1.3.6.1.2.1.1.3.0"

  [[inputs.snmp.field]]
    name   = "sys_name"
    oid    = "1.3.6.1.2.1.1.5.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "sys_descr"
    oid  = "1.3.6.1.2.1.1.1.0"

  # Per-interface counters
  [[inputs.snmp.table]]
    name         = "snmp_interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_descr"
      oid    = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_in_errors"
      oid  = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "if_out_errors"
      oid  = "1.3.6.1.2.1.2.2.1.20"
    [[inputs.snmp.table.field]]
      name = "if_in_discards"
      oid  = "1.3.6.1.2.1.2.2.1.13"
    [[inputs.snmp.table.field]]
      name = "if_out_discards"
      oid  = "1.3.6.1.2.1.2.2.1.19"
    [[inputs.snmp.table.field]]
      name = "if_oper_status"
      oid  = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "if_admin_status"
      oid  = "1.3.6.1.2.1.2.2.1.7"
    [[inputs.snmp.table.field]]
      name = "if_speed"
      oid  = "1.3.6.1.2.1.2.2.1.5"

[[inputs.ping]]
  urls       = ["__HOST__"]
  count      = 3
  ping_interval = 1.0
  timeout    = 2.0
  interval   = "__POLL_INTERVAL__s"
  [inputs.ping.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "switch_generic"
    host         = "__HOST__"
