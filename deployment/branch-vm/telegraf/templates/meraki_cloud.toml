# ─── Meraki Cloud Controller — MERAKI-CLOUD-CONTROLLER-MIB ─────
# Private root: 1.3.6.1.4.1.29671 = meraki
#   .1.1   organization name
#   .1.4   devTable          (one row per device — switch / AP / MX)
#   .1.5   devInterfaceTable (per-device per-interface counters)
#
# IMPORTANT: Meraki devices do NOT respond to SNMP locally. This template
# polls the Meraki regional cloud endpoint (e.g. snmp.meraki.com:16100),
# which returns data for EVERY device in your organisation in one poll.
# Add a single SnmpDevice with type=meraki_cloud — not one per switch.
#
# Configure on the Meraki side:
#   Dashboard → Organization → Settings → SNMP access
#     • SNMP version: v2c
#     • Community string: <pick one>
#     • Endpoint URL it shows you (region-specific) → use that as the host
#
# Add in SG_NOC SNMP Devices:
#   Branch:    (any — picks which branch VM does the poll)
#   Name:      e.g. "Meraki-Org"
#   Host:      snmp.meraki.com   (or the URL shown by the dashboard)
#   Port:      16100
#   Version:   2c
#   Community: <set above>
#   Type:      Meraki cloud (org)
#   Polling:   300 seconds (Meraki updates the SNMP cache every 5 min,
#              so faster polling is wasted load)

[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "15s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "meraki_cloud"
    host         = "__HOST__"

  # ─ Org-level scalars (.1.1) ─
  [[inputs.snmp.field]]
    name   = "organization_name"
    oid    = "1.3.6.1.4.1.29671.1.1.0"
    is_tag = true

  # ─ Device table (.1.4.1) — devEntry, indexed by devMac ─
  # Status enum: 0 = offline, 1 = online.
  # MeshStatus enum: 0 = gateway, 1 = repeater.
  [[inputs.snmp.table]]
    name         = "snmp_meraki_device"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "dev_mac"
      oid    = "1.3.6.1.4.1.29671.1.4.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "dev_name"
      oid    = "1.3.6.1.4.1.29671.1.4.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "dev_status"
      oid  = "1.3.6.1.4.1.29671.1.4.1.3"
    [[inputs.snmp.table.field]]
      name = "dev_client_count"
      oid  = "1.3.6.1.4.1.29671.1.4.1.5"
    [[inputs.snmp.table.field]]
      name = "dev_mesh_status"
      oid  = "1.3.6.1.4.1.29671.1.4.1.6"
    [[inputs.snmp.table.field]]
      name   = "dev_serial"
      oid    = "1.3.6.1.4.1.29671.1.4.1.8"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "dev_product_code"
      oid    = "1.3.6.1.4.1.29671.1.4.1.9"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "dev_product_description"
      oid    = "1.3.6.1.4.1.29671.1.4.1.10"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "dev_network_name"
      oid    = "1.3.6.1.4.1.29671.1.4.1.11"
      is_tag = true

  # ─ Device interface table (.1.5.1) — devInterfaceEntry, indexed by ─
  #   { devInterfaceDevMac, devInterfaceIndex }. Counter32 byte / packet
  #   totals; use rate() in Grafana to get bps / pps.
  [[inputs.snmp.table]]
    name         = "snmp_meraki_interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "dev_mac"
      oid    = "1.3.6.1.4.1.29671.1.5.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.4.1.29671.1.5.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_name"
      oid    = "1.3.6.1.4.1.29671.1.5.1.3"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "sent_pkts"
      oid  = "1.3.6.1.4.1.29671.1.5.1.4"
    [[inputs.snmp.table.field]]
      name = "recv_pkts"
      oid  = "1.3.6.1.4.1.29671.1.5.1.5"
    [[inputs.snmp.table.field]]
      name = "sent_bytes"
      oid  = "1.3.6.1.4.1.29671.1.5.1.6"
    [[inputs.snmp.table.field]]
      name = "recv_bytes"
      oid  = "1.3.6.1.4.1.29671.1.5.1.7"
    [[inputs.snmp.table.field]]
      name   = "if_description"
      oid    = "1.3.6.1.4.1.29671.1.5.1.10"
      is_tag = true

# ─── No ICMP ping for Meraki cloud — the host is the cloud endpoint ───
# (responding to ping just tells you Meraki's API gateway is up, not your
# devices). Per-device online state comes from snmp_meraki_device_dev_status.
