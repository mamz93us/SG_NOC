# ─── Sophos XGS firewall — uses the SFOS-FIREWALL-MIB ────────────
# Private root: 1.3.6.1.4.1.2604.5.1 = sfosXGMIBObjects
#   .1 sfosXGDeviceInfo
#   .2 sfosXGDeviceStats
#       .4 sfosDiskStatus
#       .5 sfosMemoryStatus
#   .4 sfosXGHAStats
#   .6 sfosXGTunnelInfo
#   .9 sfosXGSystemHealth        (XGS-only, recent firmware)
# Per-interface counters come from MIB-2 (1.3.6.1.2.1.2).
#
# Placeholders __XXX__ rendered by snmp-sync.php from the NOC's device list.
[[inputs.snmp]]
  agents       = ["udp://__HOST__:__PORT__"]
  version      = 2
  community    = "__COMMUNITY__"
  interval     = "__POLL_INTERVAL__s"
  timeout      = "5s"
  retries      = 2
  name         = "snmp"

  [inputs.snmp.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "sophos_xgs"
    host         = "__HOST__"

  # ─ Device info (sfosXGDeviceInfo = .1) ─
  [[inputs.snmp.field]]
    name   = "sys_name"
    oid    = "1.3.6.1.4.1.2604.5.1.1.1.0"
    is_tag = true
  [[inputs.snmp.field]]
    name   = "device_model"
    oid    = "1.3.6.1.4.1.2604.5.1.1.2.0"
    is_tag = true
  [[inputs.snmp.field]]
    name   = "fw_version"
    oid    = "1.3.6.1.4.1.2604.5.1.1.3.0"
    is_tag = true

  # ─ Device stats (sfosXGDeviceStats = .2) ─
  [[inputs.snmp.field]]
    name = "uptime_ticks"
    oid  = "1.3.6.1.4.1.2604.5.1.2.2.0"
  [[inputs.snmp.field]]
    name = "live_users"
    oid  = "1.3.6.1.4.1.2604.5.1.2.6.0"
  [[inputs.snmp.field]]
    name = "http_hits"
    oid  = "1.3.6.1.4.1.2604.5.1.2.7.0"
  [[inputs.snmp.field]]
    name = "ftp_hits"
    oid  = "1.3.6.1.4.1.2604.5.1.2.8.0"

  # ─ Disk (sfosDiskStatus = .2.4) ─
  [[inputs.snmp.field]]
    name = "disk_capacity_mb"
    oid  = "1.3.6.1.4.1.2604.5.1.2.4.1.0"
  [[inputs.snmp.field]]
    name = "disk_used_pct"
    oid  = "1.3.6.1.4.1.2604.5.1.2.4.2.0"

  # ─ Memory + swap (sfosMemoryStatus = .2.5) ─
  [[inputs.snmp.field]]
    name = "memory_capacity_mb"
    oid  = "1.3.6.1.4.1.2604.5.1.2.5.1.0"
  [[inputs.snmp.field]]
    name = "memory_used_pct"
    oid  = "1.3.6.1.4.1.2604.5.1.2.5.2.0"
  [[inputs.snmp.field]]
    name = "swap_capacity_mb"
    oid  = "1.3.6.1.4.1.2604.5.1.2.5.3.0"
  [[inputs.snmp.field]]
    name = "swap_used_pct"
    oid  = "1.3.6.1.4.1.2604.5.1.2.5.4.0"

  # ─ HA status (sfosXGHAStats = .4) ─
  [[inputs.snmp.field]]
    name = "ha_status"
    oid  = "1.3.6.1.4.1.2604.5.1.4.1.0"
  [[inputs.snmp.field]]
    name = "ha_state_current"
    oid  = "1.3.6.1.4.1.2604.5.1.4.4.0"

  # ─ System health (sfosXGSystemHealth = .9) — newer XGS firmware only.
  #   If your model/firmware doesn't implement these, Telegraf skips them. ─
  [[inputs.snmp.field]]
    name = "npu_temperature_decicelsius"
    oid  = "1.3.6.1.4.1.2604.5.1.9.1.0"
  [[inputs.snmp.field]]
    name = "cpu_temperature_decicelsius"
    oid  = "1.3.6.1.4.1.2604.5.1.9.2.0"

  # ─ Per-interface counters (IF-MIB) ─
  [[inputs.snmp.table]]
    name         = "snmp_interface"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "if_index"
      oid    = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "if_descr"
      oid    = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_in_errors"
      oid  = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "if_out_errors"
      oid  = "1.3.6.1.2.1.2.2.1.20"
    [[inputs.snmp.table.field]]
      name = "if_in_discards"
      oid  = "1.3.6.1.2.1.2.2.1.13"
    [[inputs.snmp.table.field]]
      name = "if_out_discards"
      oid  = "1.3.6.1.2.1.2.2.1.19"
    [[inputs.snmp.table.field]]
      name = "if_oper_status"
      oid  = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "if_speed"
      oid  = "1.3.6.1.2.1.2.2.1.5"

  # ─ IPsec VPN tunnels (sfosIPSecVpnTunnelTable = .6.1.1.1) ─
  [[inputs.snmp.table]]
    name         = "snmp_ipsec_tunnel"
    inherit_tags = ["device_name", "device_type", "host", "branch"]

    [[inputs.snmp.table.field]]
      name   = "tunnel_id"
      oid    = "1.3.6.1.4.1.2604.5.1.6.1.1.1.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name   = "conn_name"
      oid    = "1.3.6.1.4.1.2604.5.1.6.1.1.1.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "active_tunnels"
      oid  = "1.3.6.1.4.1.2604.5.1.6.1.1.1.1.8"
    [[inputs.snmp.table.field]]
      name = "conn_status"
      oid  = "1.3.6.1.4.1.2604.5.1.6.1.1.1.1.9"
    [[inputs.snmp.table.field]]
      name = "activated"
      oid  = "1.3.6.1.4.1.2604.5.1.6.1.1.1.1.10"

# ─── ICMP ping for liveness, independent of SNMP ───────────────
[[inputs.ping]]
  urls          = ["__HOST__"]
  count         = 3
  ping_interval = 1.0
  timeout       = 2.0
  interval      = "__POLL_INTERVAL__s"
  [inputs.ping.tags]
    branch       = "__BRANCH__"
    device_name  = "__NAME__"
    device_type  = "sophos_xgs"
    host         = "__HOST__"
