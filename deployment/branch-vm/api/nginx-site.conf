# ─────────────────────────────────────────────────────────────────────────
# nginx site for the SG_NOC branch query API.
#
# install.sh substitutes __NOC_ALLOWED_CIDR__ with the value from
# /etc/sg-noc-branch.env. Restricting at the nginx layer is defence-
# in-depth; the API also requires a Bearer token.
# ─────────────────────────────────────────────────────────────────────────

# Modest connection rate-limit per source IP. Even at multiple branches
# the NOC will only hit each one with a few req/sec.
limit_req_zone $binary_remote_addr zone=sg_noc_api:1m rate=20r/s;

server {
    listen 8514 default_server;
    listen [::]:8514 default_server;

    server_name _;

    access_log /var/log/nginx/sg-noc-access.log combined;
    error_log  /var/log/nginx/sg-noc-error.log warn;

    # Source-IP allowlist. Overrides default-deny below for NOC traffic.
    allow __NOC_ALLOWED_CIDR__;
    allow 127.0.0.1;
    deny all;

    # Single document root: the slim PHP API.
    root /opt/sg-noc-branch/api/public;
    index index.php;

    client_max_body_size 1m;
    keepalive_timeout    30s;

    # Health endpoint bypasses rate limit for liveness probes.
    location = /api/health {
        try_files $uri /index.php?$query_string;
    }

    # Everything else routes through the PHP front-controller.
    location / {
        limit_req zone=sg_noc_api burst=20 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM. The exact socket path depends on PHP version installed by
    # apt; install.sh adjusts this if needed. 8.3 is the default on
    # Ubuntu 24.04.
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 30s;
    }

    # Don't expose dotfiles or library directory contents.
    location ~ /\. { deny all; }
    location /lib { deny all; }
}
