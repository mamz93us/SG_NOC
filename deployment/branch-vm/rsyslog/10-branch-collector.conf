# ─────────────────────────────────────────────────────────────────────────
# SG_NOC branch collector for rsyslog.
#
# Listens on UDP+TCP 514. Writes one JSON object per message to a queue
# file, which the PHP ingester tails and inserts into MariaDB.
#
# install.sh substitutes __BRANCH_ID__ with the value from
# /etc/sg-noc-branch.env. Don't edit the live file at /etc/rsyslog.d/ —
# edit this template, then re-run update.sh.
#
# rsyslog rule:  ALL template() declarations must be at GLOBAL scope,
# never inside a ruleset() { } block — that triggers a parse error.
# ─────────────────────────────────────────────────────────────────────────

# ─── Module + input declarations (global) ───────────────────────────────
module(load="imudp")
module(load="imtcp")

input(type="imudp" port="514" ruleset="branchIn")
input(type="imtcp" port="514" ruleset="branchIn")

# ─── Templates (global) ─────────────────────────────────────────────────

# JSONL output — one JSON object per message. Keys match the columns
# the PHP ingester INSERTs into syslog_messages. format="json" on every
# property gets us proper escaping for embedded quotes / backslashes /
# newlines / control chars (the bug ommysql had with phone DEBUG lines).
template(name="JsonLine" type="list") {
    constant(value="{\"branch\":\"__BRANCH_ID__\",\"received_at\":\"")
    property(name="timegenerated" dateFormat="rfc3339" format="json")
    constant(value="\",\"device_time\":\"")
    property(name="timereported" dateFormat="rfc3339" format="json")
    constant(value="\",\"source\":\"")
    property(name="hostname" format="json")
    constant(value="\",\"source_ip\":\"")
    property(name="fromhost-ip" format="json")
    constant(value="\",\"program\":\"")
    property(name="programname" format="json")
    constant(value="\",\"facility\":")
    property(name="syslogfacility")
    constant(value=",\"severity\":")
    property(name="syslogseverity")
    constant(value=",\"message\":\"")
    property(name="msg" format="json")
    constant(value="\"}\n")
}

# Raw human-readable per-source-IP-per-day file — secondary copy used for
# ad-hoc grep when MariaDB query overhead isn't worth it.
template(name="RawPerHost" type="string"
    string="/var/log/branch/%fromhost-ip%/%$YEAR%-%$MONTH%-%$DAY%.log")

# ─── Ruleset (NO template() definitions allowed inside) ─────────────────
ruleset(name="branchIn") {
    # Drop the highest-volume Grandstream phone DEBUG noise so we don't
    # pay storage cost for it. Adjust patterns as you spot more in prod.
    if ($msg contains "GUI DEBUG"       and $programname startswith "GRP") then stop
    if ($msg contains "STA DEBUG nl80211")                                  then stop
    if ($msg contains "GSPHONE DEBUG"   and $programname startswith "GRP") then stop
    if ($msg contains "Empty record return")                                then stop

    # 1. Write JSONL to the spool — the PHP ingester tails this.
    action(
        type="omfile"
        file="/var/spool/sg-noc-ingest/queue.jsonl"
        template="JsonLine"
        ioBufferSize="64k"
        flushOnTXEnd="on"
        flushInterval="1"
        fileOwner="syslog" fileGroup="adm" fileCreateMode="0640"
    )

    # 2. Also keep a raw human-readable copy per source IP per day. Lets
    #    engineers `tail -f` or `grep` directly without going through the
    #    DB. Rotated by logrotate (see /etc/logrotate.d/branch).
    action(
        type="omfile"
        dynaFile="RawPerHost"
        createDirs="on"
        fileOwner="syslog" fileGroup="adm" fileCreateMode="0640"
    )
}
