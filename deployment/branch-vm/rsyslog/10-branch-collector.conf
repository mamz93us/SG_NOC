# ─────────────────────────────────────────────────────────────────────────
# SG_NOC branch collector for rsyslog.
#
# Listens on UDP+TCP 514. Writes one JSON object per message to a queue
# file, which the PHP ingester tails and inserts into MariaDB.
#
# install.sh substitutes __BRANCH_ID__ with the value from
# /etc/sg-noc-branch.env. Don't edit the live file at /etc/rsyslog.d/ —
# edit this template, then re-run update.sh.
# ─────────────────────────────────────────────────────────────────────────

# Load UDP and TCP input modules (most syslog clients support either).
module(load="imudp")
module(load="imtcp")

input(type="imudp" port="514" ruleset="branchIn")
input(type="imtcp" port="514" ruleset="branchIn")

# JSON template — one line per message. The keys here match the column
# names in the MariaDB schema so the ingester can json_decode() and pass
# straight to a prepared INSERT.
template(name="JsonLine" type="list" option.jsonf="on") {
    constant(value="{\"branch\":\"__BRANCH_ID__\",")
    property(outname="received_at" name="timegenerated" dateFormat="rfc3339" format="jsonf")
    property(outname="device_time" name="timereported" dateFormat="rfc3339" format="jsonf")
    property(outname="source"      name="hostname" format="jsonf")
    property(outname="source_ip"   name="fromhost-ip" format="jsonf")
    property(outname="program"     name="programname" format="jsonf")
    property(outname="facility"    name="syslogfacility" format="jsonf")
    property(outname="severity"    name="syslogseverity" format="jsonf")
    property(outname="message"     name="msg" format="jsonf")
    constant(value="}\n")
}

# Drop the highest-volume Grandstream phone DEBUG noise so we don't pay
# storage cost for it. Adjust patterns as you spot more in production.
ruleset(name="branchIn") {
    if ($msg contains "GUI DEBUG"       and $programname startswith "GRP") then stop
    if ($msg contains "STA DEBUG nl80211")                                  then stop
    if ($msg contains "GSPHONE DEBUG"   and $programname startswith "GRP") then stop
    if ($msg contains "Empty record return")                                then stop

    # Write JSONL to the spool — the ingester reads this. Unbuffered so
    # messages are ingested within ~100ms of arrival.
    action(
        type="omfile"
        file="/var/spool/sg-noc-ingest/queue.jsonl"
        template="JsonLine"
        ioBufferSize="64k"
        flushOnTXEnd="on"
        flushInterval="1"
        fileOwner="syslog" fileGroup="adm" fileCreateMode="0640"
    )

    # ALSO keep a raw human-readable copy per source-IP per day, for
    # scenarios where engineers want to grep raw text without going
    # through MariaDB. Rotated by logrotate (see /etc/logrotate.d/branch).
    template(name="RawPerHost" type="string"
        string="/var/log/branch/%fromhost-ip%/%$YEAR%-%$MONTH%-%$DAY%.log")
    action(
        type="omfile"
        dynaFile="RawPerHost"
        createDirs="on"
        fileOwner="syslog" fileGroup="adm" fileCreateMode="0640"
    )
}
