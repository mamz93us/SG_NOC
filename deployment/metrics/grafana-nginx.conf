# ─────────────────────────────────────────────────────────────────────────
# nginx config for exposing Grafana publicly. Two layouts — pick ONE,
# adapt to your nginx setup, then reload (`sudo nginx -t && sudo systemctl
# reload nginx`).
# ─────────────────────────────────────────────────────────────────────────


# ─── Layout 1 — Sub-path on the existing NOC hostname ──────────────────
# Grafana lives at https://noc.samirgroup.net/grafana/ — reuses the existing
# Let's Encrypt cert, no DNS work needed. Drop this `location` block inside
# the existing `server { listen 443 ssl; server_name noc.samirgroup.net; }`
# block in /etc/nginx/sites-available/sg-noc (or wherever the SG_NOC site
# is defined).
#
# ALSO set in deployment/metrics/.env:
#   GRAFANA_ROOT_URL=https://noc.samirgroup.net/grafana/
#   GRAFANA_SERVE_FROM_SUB_PATH=true
# then `docker compose -f /opt/sg-noc-metrics/docker-compose.yml up -d`
# to apply.
# Then in the SG_NOC Laravel .env:
#   GRAFANA_URL=https://noc.samirgroup.net/grafana/
# and `php artisan config:clear` so the navbar link surfaces.

#   location /grafana/ {
#       # Trailing slash on both sides → strips /grafana/ before forwarding.
#       proxy_pass http://127.0.0.1:3000/;
#
#       proxy_set_header Host              $host;
#       proxy_set_header X-Real-IP         $remote_addr;
#       proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_http_version 1.1;
#
#       # Grafana Live (live tail of dashboards) needs WebSocket upgrade.
#       proxy_set_header Upgrade           $http_upgrade;
#       proxy_set_header Connection        "upgrade";
#
#       # Streaming alerts / long-poll panels — be generous with timeouts.
#       proxy_read_timeout 90s;
#       proxy_send_timeout 90s;
#   }


# ─── Layout 2 — Dedicated subdomain ────────────────────────────────────
# Grafana lives at https://metrics.samirgroup.net/. Cleaner URL but needs
# DNS A-record + a separate Let's Encrypt cert. Drop this entire `server`
# block into /etc/nginx/sites-available/grafana, then symlink into
# sites-enabled and reload.
#
# .env should keep the defaults:
#   GRAFANA_ROOT_URL=https://metrics.samirgroup.net/
#   GRAFANA_SERVE_FROM_SUB_PATH=false
# SG_NOC Laravel .env:
#   GRAFANA_URL=https://metrics.samirgroup.net/

