# ─────────────────────────────────────────────────────────────────────────
# SG_NOC — Metrics stack (VictoriaMetrics + Grafana).
#
# Receives Prometheus remote_write from each branch's Telegraf and renders
# dashboards. Sized for the whole 9-branch estate (~2 GB/year of metrics).
#
# Listens on:
#   :8428                     VictoriaMetrics HTTP — bind to 127.0.0.1
#                             only; nginx terminates TLS publicly if needed,
#                             AND you should also allow only the IPsec CIDR.
#   :3000                     Grafana — proxied by nginx (e.g. metrics.samirgroup.net)
#
# Secrets live in deployment/metrics/.env (NOT in git). Copy
# deployment/metrics/.env.example → .env, fill in, then `docker compose up -d`.
# ─────────────────────────────────────────────────────────────────────────

services:

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    container_name: victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=2y"             # 2-year retention
      - "--maxConcurrentInserts=8"
      - "--memory.allowedPercent=60"
      # Auth is enforced at the nginx layer (basic auth + IP allowlist for
      # the public /api/v1/write endpoint). VM itself binds 127.0.0.1 only
      # so the only way in from the network is via nginx.
    ports:
      # Loopback for Grafana / nginx / curl tests on the NOC itself.
      - "127.0.0.1:8428:8428"
      # Tunnel-side IP for branch Telegraf to push remote_write directly.
      # Set VM_TUNNEL_IP in .env (e.g. VM_TUNNEL_IP=172.22.0.4 — the NOC's
      # IPsec-side address). Default 127.0.0.2 = harmless loopback alias
      # (kernel routes 127.0.0.0/8 to lo) so the second binding doesn't
      # collide with 127.0.0.1 above when no tunnel is configured.
      - "${VM_TUNNEL_IP:-127.0.0.2}:8428:8428"
    volumes:
      - vm_data:/storage
    networks:
      - metrics
    # No healthcheck: the VictoriaMetrics image is FROM scratch — no shell,
    # no wget, no curl, so a CMD-style healthcheck can never run inside.
    # Docker's process-alive check (PID 1) is sufficient.

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      victoriametrics:
        condition: service_started
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      # Public URL users hit. For path-based serving behind nginx
      # (e.g. https://noc.samirgroup.net/grafana/) set
      #   GRAFANA_ROOT_URL=https://noc.samirgroup.net/grafana/
      #   GRAFANA_SERVE_FROM_SUB_PATH=true
      # in deployment/metrics/.env. For a dedicated subdomain leave
      # SERVE_FROM_SUB_PATH=false (Grafana's default).
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://metrics.samirgroup.net/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GRAFANA_SERVE_FROM_SUB_PATH:-false}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=
      - GF_FEATURE_TOGGLES_ENABLE=
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - metrics
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  vm_data:
  grafana_data:

networks:
  metrics:
    driver: bridge
