# SFTP-only chroot for NOC device backups.
#
# setup-sftp.sh writes a generated copy of this to
# /etc/ssh/sshd_config.d/60-sftp-backup.conf when sshd Include's that directory
# (Ubuntu/Debian default). If yours does NOT, append this Match block to the
# END of /etc/ssh/sshd_config by hand — Match blocks must come last — then:
#     sudo sshd -t && sudo systemctl reload ssh
#
# Keep the group name in sync with SFTP_GROUP in setup-sftp.sh (default below).

Match Group sftpbackup
    # Chroot root — must be root-owned and not group/world writable. Devices
    # land here (read-only) and can only write inside the inbox/ subfolder.
    ChrootDirectory /srv/sftp-backups

    # internal-sftp = no shell at all. -u 0002 sets the upload umask so files
    # land 0664 / dirs 0775 within the setgid inbox, letting the in-group app
    # user (the scheduler) read them and delete them after upload.
    ForceCommand internal-sftp -u 0002

    # Lock the account down to file transfer only.
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no

    # authorized_keys MUST live outside the chroot — sshd reads it before
    # chroot'ing. Drop a device's public key at /etc/ssh/sftp-authorized-keys/<user>.
    AuthorizedKeysFile /etc/ssh/sftp-authorized-keys/%u

    # Most devices can do key auth. Uncomment ONLY if a device is password-only;
    # this scopes password auth to this group without enabling it server-wide.
    # PasswordAuthentication yes
