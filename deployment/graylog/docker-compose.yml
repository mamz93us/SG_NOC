# ─────────────────────────────────────────────────────────────────────────
# SG_NOC — Graylog Open stack for centralized log management.
#
# Three containers:
#   mongo      : Graylog config / metadata
#   opensearch : log storage + search
#   graylog    : the app (UI + ingestion + processing)
#
# Listens on:
#   :9000  → Graylog web UI (proxied by nginx as https://logs.samirgroup.net)
#   :1514/udp + :1514/tcp → Syslog input (rsyslog forwards here)
#   :12201/udp + :12201/tcp → GELF input (kept open for future use)
#
# Secrets live in deployment/graylog/.env (NOT in git). Copy
# deployment/graylog/.env.example → .env, fill in the values, then
# `docker compose up -d`.
# ─────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:6.0
    container_name: graylog-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - graylog
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: graylog-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=graylog
      - node.name=graylog-os
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - action.auto_create_index=false
      # OpenSearch 2.12+ enabled the Security plugin by default; the
      # entrypoint script bails unless we either provide an admin password
      # OR set both of these to skip security entirely. Graylog talks to
      # OpenSearch over the internal Docker network, so disabling auth is
      # safe (the port isn't exposed).
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      # OpenSearch heap — half of the RAM you allocate to this container.
      # 2g heap → ~4-6g container working set comfortably handles 10M/day.
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    networks:
      - graylog
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  graylog:
    image: graylog/graylog:6.1
    container_name: graylog
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      # Container time zone — matters for display defaults inside the
      # Graylog UI and any internal log timestamps. Per-input "Time Zone"
      # settings still need to be set on each Syslog input separately,
      # since devices send local-time syslog without TZ info.
      - TZ=Asia/Riyadh
      - GRAYLOG_ROOT_TIMEZONE=Asia/Riyadh
      # 16-byte+ secret used to encrypt user passwords at rest.
      # Generate with: pwgen -N 1 -s 96
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET}
      # SHA-256 of the initial admin password.
      # Generate with: echo -n "yourpassword" | sha256sum
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2}
      # Where users browse to. nginx proxies to this from the public URL.
      - GRAYLOG_HTTP_EXTERNAL_URI=${GRAYLOG_HTTP_EXTERNAL_URI:-http://127.0.0.1:9000/}
      # Trust the X-Forwarded-* headers nginx sets so Graylog generates
      # correct redirect URLs. http_publish_uri is auto-detected from
      # the container's IP — leaving it unset avoids the constant
      # "0.0.0.0 is not valid" warning in logs.
      - GRAYLOG_TRUSTED_PROXIES=127.0.0.1/32
      # Storage backend.
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongo:27017/graylog
      # JVM heap — bigger = more concurrent searches/aggregations.
      - GRAYLOG_SERVER_JAVA_OPTS=-Xms1g -Xmx1g -XX:+UseG1GC
    ports:
      - "127.0.0.1:9000:9000"          # web UI — exposed to localhost only,
                                       # nginx terminates TLS publicly
      - "0.0.0.0:1514:1514/udp"        # syslog UDP
      - "0.0.0.0:1514:1514/tcp"        # syslog TCP
      - "0.0.0.0:12201:12201/udp"      # GELF UDP (future use)
      - "0.0.0.0:12201:12201/tcp"      # GELF TCP (future use)
    volumes:
      - graylog_data:/usr/share/graylog/data
    networks:
      - graylog
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/api/system/lbstatus || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  mongo_data:
  os_data:
  graylog_data:

networks:
  graylog:
    driver: bridge
