# =============================================================================
# Static FreeRADIUS clients
# =============================================================================
# All real NAS clients (switches, APs) are read from radius_nas_clients via
# rlm_sql (read_clients = yes) — managed from the Laravel admin UI.
#
# This file only carries:
#   1. localhost   — for `radclient` / `radtest` smoke tests on the VPS.
#
# NEVER add real network gear here; add it via /admin/radius/nas instead so
# the audit trail (who added it, when) stays in the app database.
# =============================================================================

client localhost {
    ipaddr  = 127.0.0.1
    proto   = udp
    secret  = testing123
    require_message_authenticator = no
    nas_type = other
    shortname = localhost
}

client localhost_ipv6 {
    ipv6addr = ::1
    secret   = testing123
    require_message_authenticator = no
    shortname = localhost-v6
}
