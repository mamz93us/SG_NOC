# ─────────────────────────────────────────────────────────────────────────
# Forward every message that passed the sgNocRemote filter to Graylog as
# well as MySQL. Drop into /etc/rsyslog.d/ alongside 50-sg-noc-syslog.conf.
#
# Once you're happy that Graylog has everything you need, you can stop
# writing to MySQL by removing the `call sgNocSyslogAction` line in
# 50-sg-noc-syslog.conf. Until then both stores receive the same data.
# ─────────────────────────────────────────────────────────────────────────

# RFC5424 template — preserves structured data and microsecond timestamps.
# Graylog's Syslog input parses both RFC3164 and RFC5424 automatically.
template(name="GraylogSyslog5424" type="string"
    string="<%pri%>1 %timegenerated:::date-rfc3339% %hostname% %programname% %procid% %msgid% - %msg%\n"
)

# Define the forwarder action as a callable ruleset. Hooked into the
# main pipeline by appending `call graylogForward` to sgNocRemote in
# 50-sg-noc-syslog.conf (see SETUP).
ruleset(name="graylogForward") {
    action(
        type="omfwd"
        target="127.0.0.1"
        port="1514"
        protocol="tcp"            # TCP for reliability; switch to "udp" if you want lower overhead
        template="GraylogSyslog5424"

        # Disk-assisted queue keeps messages if Graylog is restarting.
        queue.type="LinkedList"
        queue.filename="graylog_fwd_q"
        queue.maxdiskspace="500m"
        queue.saveonshutdown="on"
        action.resumeRetryCount="-1"
    )
}
