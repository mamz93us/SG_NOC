# ─────────────────────────────────────────────────────────────────────────
# SG_NOC central syslog receiver — drops into /etc/rsyslog.d/
#
# Listens on UDP 514 and TCP 514, parses incoming syslog messages, and
# inserts every row into the `syslog_messages` MySQL table for the
# Laravel UI / alert matcher to read.
#
# DB credentials live in 90-sg-noc-syslog-secret.conf (root-readable
# only) so this file can stay in git without leaking the password.
#
# Deploy:
#   sudo cp deployment/rsyslog/50-sg-noc-syslog.conf /etc/rsyslog.d/
#   sudo cp deployment/rsyslog/90-sg-noc-syslog-secret.conf.example \
#           /etc/rsyslog.d/90-sg-noc-syslog-secret.conf
#   sudo chmod 600 /etc/rsyslog.d/90-sg-noc-syslog-secret.conf
#   sudo nano  /etc/rsyslog.d/90-sg-noc-syslog-secret.conf  # set password
#   sudo systemctl restart rsyslog
# ─────────────────────────────────────────────────────────────────────────

# Load the MySQL output module.
module(load="ommysql")

# UDP receiver — RFC 3164 (legacy BSD syslog). Port 514.
module(load="imudp")
input(type="imudp" port="514" ruleset="sgNocRemote")

# TCP receiver — RFC 5424 + 3164. Port 514. Reliable transport.
module(load="imtcp")
input(type="imtcp" port="514" ruleset="sgNocRemote")

# SQL INSERT template. option.stdsql="on" escapes single quotes per
# SQL spec so we don't have to worry about quote injection in messages.
# Columns line up with the syslog_messages migration.
template(name="sgNocSyslogInsert" type="list" option.stdsql="on") {
    constant(value="INSERT INTO syslog_messages ")
    constant(value="(received_at, device_time, facility, severity, host, source_ip, program, message, raw) VALUES ('")
    property(name="timegenerated" dateFormat="mysql")
    constant(value="','")
    property(name="timereported" dateFormat="mysql")
    constant(value="',")
    property(name="syslogfacility")
    constant(value=",")
    property(name="syslogseverity")
    constant(value=",'")
    property(name="hostname")
    constant(value="','")
    property(name="fromhost-ip")
    constant(value="','")
    property(name="programname")
    constant(value="','")
    property(name="msg")
    constant(value="','")
    property(name="rawmsg")
    constant(value="')")
}

# Ruleset applied to remote (and local-forwarded) messages.
# The actual ommysql action is in the secret file so the password
# isn't checked into git.
ruleset(name="sgNocRemote") {
    # Drop debug-level (severity 7) noise to keep the table small.
    # Adjust if you want full fidelity.
    if $syslogseverity == 7 then {
        stop
    }

    # ── High-volume drops ────────────────────────────────────────────
    # With 9 firewalls forwarding, every "Allowed" subtype (Firewall
    # Rule, HTTP, Application, Appliance Access) drowns the table.
    # Drop them all — keep Denied/Dropped, IPS, system/admin events.
    if $rawmsg contains 'log_subtype="Allowed"' then {
        stop
    }

    # "Invalid Traffic" is mostly asymmetric routing chatter — low
    # operational value. Remove this block if you're investigating
    # a specific routing issue.
    if $rawmsg contains 'log_component="Invalid Traffic"' then {
        stop
    }

    # ICMP redirects, IP Spoof background hum, and TR069 INFO
    # heartbeats from UCMs are all noise — uncomment to drop.
    # if $rawmsg contains 'TR069 INFO' then { stop }
    # if $rawmsg contains '[odbc_log] No record' then { stop }

    # Forward to the configured action (defined in the secret file).
    call sgNocSyslogAction
}
