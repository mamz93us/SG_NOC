; Drop-in replacement for /etc/neko/supervisord/chromium.conf inside the
; ghcr.io/m1k1o/neko/chromium image.
;
; Changes from the image default:
;   - Removed --bwsi (guest mode; was wiping cookies/logins on every restart).
;   - Removed --disable-file-system (was blocking the File System API and would
;     break some uploads/saves in the production use-case).
;
; Everything else matches the upstream config so we get the same rendering,
; GPU, and sandbox behavior Neko expects.

[program:chromium]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/chromium
  --no-sandbox
  --test-type
  --disable-features=InfoBars
  --window-position=0,0
  --display=%(ENV_DISPLAY)s
  --user-data-dir=/home/neko/.config/chromium
  --no-first-run
  --start-maximized
  --force-dark-mode
  --disable-gpu
  --disable-software-rasterizer
  --disable-dev-shm-usage
stopsignal=INT
autorestart=true
priority=800
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/chromium.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:openbox]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/openbox --config-file /etc/neko/openbox.xml
autorestart=true
priority=300
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/openbox.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true
