services:
  chromium:
    image: ghcr.io/m1k1o/neko/chromium:latest
    container_name: neko-test
    restart: unless-stopped
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    networks:
      - browser-net
    ports:
      # WebRTC UDP ports MUST be published at host level — WebRTC can't
      # cleanly traverse a Docker bridge. Only the UDP range is published;
      # the HTTP :8080 is intentionally NOT published here because in the
      # production flow Nginx will reverse-proxy to it over the bridge.
      # For this step we temporarily re-expose 18080 so we can verify the
      # stream still works on browser-net. We'll drop it at Step 4.
      - "18080:8080"
      - "52000-52100:52000-52100/udp"
    volumes:
      # Persistent volume so logins/cookies survive container restarts.
      - neko_test:/home/neko
      # Override the image's supervisord config to remove --bwsi (guest mode,
      # which wipes the profile on every launch) and --disable-file-system
      # (breaks uploads). Bind-mount read-only.
      - ./chromium-supervisor.conf:/etc/neko/supervisord/chromium.conf:ro
      # Override the image's kiosk-grade Chromium managed policy so bookmarks,
      # uploads, password manager, etc. actually work. Keeps DevTools/incognito/
      # Chrome-sync locked. Bind-mount read-only.
      - ./chromium-policies.json:/etc/chromium/policies/managed/policies.json:ro
    environment:
      NEKO_DESKTOP_SCREEN: "1920x1080@30"
      NEKO_SERVER_BIND: "0.0.0.0:8080"
      NEKO_MEMBER_PROVIDER: "multiuser"
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: "${NEKO_USER_PASSWORD}"
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: "${NEKO_ADMIN_PASSWORD}"
      NEKO_WEBRTC_EPR: "52000-52100"
      NEKO_WEBRTC_NAT1TO1: "${VPS_PUBLIC_IP}"
      NEKO_WEBRTC_ICELITE: "true"

networks:
  browser-net:
    external: true   # created by bootstrap-vps.sh at Step 2

volumes:
  neko_test:
    # Docker-managed named volume; persists across `down` + `up`.
    # Delete manually with: sudo docker volume rm test_neko_test
