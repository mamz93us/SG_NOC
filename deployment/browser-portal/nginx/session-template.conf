# Per-session Nginx snippet rendered by Laravel (NginxSnippetWriter).
# Written to /etc/nginx/sites-dynamic/{SESSION_ID}.conf, picked up by the
# `include /etc/nginx/sites-dynamic/*.conf;` line inside the existing SG_NOC
# vhost server block. Laravel then runs `sudo nginx -t && sudo nginx -s reload`.
#
# Placeholders (replaced by NginxSnippetWriter):
#   {{SESSION_ID}}   -- 12-char [a-z0-9] session id, matches container name neko-{id}
#   {{CONTAINER_IP}} -- 172.30.x.x bridge IP read from `docker inspect`
#
# NOTE on proxy_pass: no trailing slash on the upstream -- we want Nginx to keep
# the `/s/{id}/` prefix intact when forwarding, because Neko is configured with
# NEKO_SERVER_PATH_PREFIX=/s/{id} and expects to see that prefix itself.

location /s/{{SESSION_ID}}/ {
    proxy_pass http://{{CONTAINER_IP}}:8080;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade -- Neko signaling runs over WS on the same path.
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Neko keeps the WS open for the life of the session; don't let idle
    # timeouts kill a tab left open on a low-traffic page.
    proxy_read_timeout  86400;
    proxy_send_timeout  86400;
    proxy_buffering     off;

    # Allow large uploads through the portal (50MB file upload is a test case).
    client_max_body_size 512m;
}
