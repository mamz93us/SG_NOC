# Manual Step 4 verification snippet — hardcoded session id = "testid".
#
# Drop this into /etc/nginx/sites-dynamic/testid.conf on the VPS after you've
# added `include /etc/nginx/sites-dynamic/*.conf;` inside the existing SG_NOC
# server block (see ../nginx/README.md for where exactly).
#
# IMPORTANT: before reloading, replace 172.30.0.2 with the real bridge IP of
# your Neko container. Find it with:
#   sudo docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' neko-test
#
# Then:
#   sudo nginx -t && sudo nginx -s reload
#
# And hit http://<VPS_PUBLIC_IP>/s/testid/ from your laptop.

location /s/testid/ {
    proxy_pass http://172.30.0.2:8080;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout  86400;
    proxy_send_timeout  86400;
    proxy_buffering     off;

    client_max_body_size 512m;
}
